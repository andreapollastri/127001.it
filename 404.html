<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>404 — 127001.it</title>
    <link href="favicon.png" rel="icon" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f7f6f3;
            --border: #e8e5df;
            --text-primary: #1a1917;
            --text-secondary: #6b6860;
            --text-muted: #a09d97;
            --accent: #2d6a4f;
            --accent-light: #e8f4f0;
        }

        html,
        body {
            height: 100%;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }

        .code {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            color: var(--accent);
            background: var(--accent-light);
            border: 1px solid rgba(82, 183, 136, 0.2);
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 32px;
            display: inline-block;
        }

        h1 {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 700;
            letter-spacing: -0.035em;
            line-height: 1.1;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        p {
            font-size: 16px;
            color: var(--text-secondary);
            line-height: 1.65;
            max-width: 380px;
            margin-bottom: 40px;
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--text-primary);
            color: var(--bg);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            letter-spacing: -0.01em;
            transition: opacity 0.2s, transform 0.15s;
        }

        a:hover {
            opacity: 0.82;
            transform: translateY(-1px);
        }

        footer {
            position: fixed;
            bottom: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        footer a {
            all: unset;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 500;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div class="code">404</div>
    <h1>Nothing here.</h1>
    <p>The page you're looking for doesn't exist — but your localhost is just one URL away.</p>
    <a href="/">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <path d="M6 10L2 6.5 6 3M2 6.5h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg>
        Back to 127001.it
    </a>
    <footer>Made by <a href="https://web.ap.it" target="_blank">Andrea Pollastri</a></footer>
</body>

</html>
